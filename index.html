<!DOCTYPE html>
<html>

<head>
    <title>Discount Price</title>

    <style>
        body {
            background-color: white;
        }
        
        .box {
            width: 250px;
            margin: auto;
            text-align: center;
            background: #c7e3ef;
            border: 5px double red;
            padding: 20px;
        }
        
        h3 {
            font-size: 25px;
        }
        
        label {
            font-size: 20px;
            font-weight: bold;
        }
        
        input {
            width: 120px;
            height: 20px;
            margin: 10px;
        }
        
        #output {
            font-size: 20px;
            font-weight: bold;
        }
        
        button {
            padding: 5px 15px;
        }
    </style>
</head>

<body>

    <div class="box">
        <h3>DISCOUNT PRICE</h3>

        <label>PRICE</label><br>
        <input type="number" id="price"><br><br>

        <label>DISCOUNT</label><br>
        <input type="number" id="discount"><br><br>

        <p id="result">TOTAL</p>

        <button onclick="calculate()">SUBMIT</button>
    </div>

    <script>
        function calculate() {
            let price = Number(document.getElementById("price").value);
            let discount = Number(document.getElementById("discount").value);

            let total = price - (price * discount / 100);
            document.getElementById("result").innerHTML = "Total = ₹" + total;
        }
    </script>

</body>

</html>
